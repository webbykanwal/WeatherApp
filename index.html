<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>🌦 Weather App</h1>

    <p class="subtitle">
        Search weather of any city in the world
    </p>

    <div class="search-box">

        <input
            type="text"
            id="city"
            placeholder="Enter city name">

        <button id="search">
            Search
        </button>

    </div>

    <div id="weather">

        <div class="weather-card">

            <h2 id="cityName">
                City Name
            </h2>

            <img
            id="icon"
            src="weather-app.png"
            alt="icon">

            <h1 id="temp">
                --°C
            </h1>

            <h3 id="condition">
                Weather
            </h3>

            <div class="details">

                <div class="box">

                    <h4>Humidity</h4>

                    <p id="humidity">
                        --
                    </p>

                </div>

                <div class="box">

                    <h4>Wind</h4>

                    <p id="wind">
                        --
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
